        <!-- javascript libraries -->
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const form = document.getElementById('registerForm');
            
                form.addEventListener('submit', function (e) {
                    e.preventDefault();
            
                    const formData = new FormData(form);
            
                    // 필수 필드 목록
                    const requiredFields = ["name", "phone", "username", "password", "bank", "account"];
            
                    for (const field of requiredFields) {
                        const value = String(formData.get(field) || "").trim();
                        if (!value) {
                            alert("모든 필수 항목을 입력해주세요.");
                            return;
                        }
                    }
            
                    // 전화번호 형식 검사 (010xxxxxxxx)
                    const phone = String(formData.get("phone")).trim();
                    const phoneRegex = /^010\d{8}$/;
                    if (!phoneRegex.test(phone)) {
                        alert("전화번호는 010으로 시작하고 11자리여야 합니다. 예: 01012345678");
                        return;
                    }
            
                    // 계좌번호 숫자만 허용
                    const account = String(formData.get("account")).trim();
                    const accountRegex = /^\d+$/;
                    if (!accountRegex.test(account)) {
                        alert("계좌번호는 숫자만 입력해주세요.");
                        return;
                    }
            
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/register.php', true);
            
                    xhr.onreadystatechange = function () {
                        if (xhr.readyState === XMLHttpRequest.DONE) {
                            try {
                                const res = JSON.parse(xhr.responseText);
                                if (xhr.status === 200 && res.ok) {
                                    alert("회원가입이 완료되었습니다. 관리자 승인 후 로그인이 가능합니다.");
                                    window.location.href = '/#login';
                                } else {
                                    alert(res.error || "회원가입에 실패했습니다.");
                                }
                            } catch (err) {
                                alert("서버 응답이 올바르지 않습니다.");
                            }
                        }
                    };
            
                    xhr.onerror = function () {
                        alert("네트워크 오류가 발생했습니다.");
                    };
            
                    xhr.send(formData);
                });
            });
        </script>
